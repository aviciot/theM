version: "3.9"
# Integration test compose overlay — exposes infrastructure ports on non-standard
# host ports so Go tests on the host machine can connect directly.
#
# Usage:
#   cd theM_gateway
#   docker compose -f docker-compose.yml -f docker-compose.integration.yml --profile temporal up -d
#   cd ../go
#   go test -tags=integration -v -timeout 120s ./internal/temporal/...
#
# Teardown:
#   cd theM_gateway
#   docker compose -f docker-compose.yml -f docker-compose.integration.yml --profile temporal down
#
# Non-standard ports avoid conflicts with any local Postgres/Redis/Temporal:
#   Postgres  → host:15432   (container:5432)
#   Redis     → host:16379   (container:6379)
#   Temporal  → host:17233   (container:7233)

services:
  them-postgres:
    ports:
      - "15432:5432"

  them-redis:
    ports:
      - "16379:6379"

  temporal-frontend:
    ports:
      - "17233:7233"
