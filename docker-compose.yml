version: "3.9"

# ============================================================
# the-M — Multi-Agent Orchestration Platform
# Fully isolated stack: own Postgres, own Redis, own network.
# ============================================================

networks:
  them-network:
    name: them-network
    driver: bridge
  proxy-network:
    external: true

# No named volumes — all data uses bind-mount folders under ./volumes/
# This ensures data survives container rebuilds and is visible on the host.

services:

  # ============================================================
  # Traefik reverse proxy — path-based routing + LB
  # ============================================================
  them-traefik:
    image: traefik:v3.6
    container_name: them-traefik
    ports:
      - "8088:8088"
      - "127.0.0.1:8089:8089"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy-network
      - them-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================
  # the-M Postgres — isolated PG16, DB: them
  # ============================================================
  them-postgres:
    image: postgres:16-alpine
    container_name: them-postgres
    environment:
      POSTGRES_DB: them
      POSTGRES_USER: ${THE_M_DB_USER:-them}
      POSTGRES_PASSWORD: ${THE_M_DB_PASSWORD:-them_secret}
    volumes:
      - ./data/them-postgres/pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${THE_M_DB_USER:-them} -d them"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================
  # the-M Redis — isolated Redis, DB index 0 (we own it entirely)
  # ============================================================
  them-redis:
    image: redis:7-alpine
    container_name: them-redis
    command: redis-server /etc/redis/redis.conf ${THE_M_REDIS_PASSWORD:+--requirepass $THE_M_REDIS_PASSWORD}
    volumes:
      - ./data/them-redis:/data
      - ./redis/config/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # the-M Auth Service — authentication & IAM (port 8701)
  # ============================================================
  them-auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: them-auth-service
    expose:
      - "8701"
    environment:
      HOST: "0.0.0.0"
      PORT: "8701"
      DATABASE_URL: "postgresql://${THE_M_DB_USER:-them}:${THE_M_DB_PASSWORD:-them_secret}@them-postgres:5432/them"
      JWT_SECRET: ${THE_M_JWT_SECRET:-change-this-jwt-secret}
      CORS_ORIGINS: ${THE_M_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - them-network
    depends_on:
      them-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8701/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================
  # the-M Bridge — orchestrator API + WS (replica 1)
  # ============================================================
  them-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: them-bridge
    expose:
      - "8001"
    volumes:
      - .:/app
      - ./data/them-logs:/app/logs
    environment:
      THE_M_INSTANCE_ID: "bridge-1"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8001"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      DATABASE_HOST: "them-postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "them"
      DATABASE_USER: ${THE_M_DB_USER:-them}
      DATABASE_PASSWORD: ${THE_M_DB_PASSWORD:-them_secret}
      REDIS_HOST: "them-redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_SSL: "false"
      AUTH_SERVICE_URL: "http://them-auth-service:8701"
      SECRET_KEY: ${THE_M_SECRET_KEY:-change-this-secret-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: ${THE_M_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "json"
      TEMPORAL_ENABLED: "true"
      TEMPORAL_HOST: "temporal-frontend:7233"
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_TASK_QUEUE: "them-orchestration"
    labels:
      - "traefik.enable=true"
      - "traefik-instance=them"
      - "traefik.docker.network=them-network"
      - "traefik.http.routers.them-api.rule=Host(`${THE_M_HOSTNAME:-localhost}`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.them-api.entrypoints=web"
      - "traefik.http.routers.them-api.priority=100"
      - "traefik.http.routers.them-api.service=them-bridge-svc"
      - "traefik.http.routers.them-ws.rule=Host(`${THE_M_HOSTNAME:-localhost}`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.them-ws.entrypoints=web"
      - "traefik.http.routers.them-ws.priority=100"
      - "traefik.http.routers.them-ws.service=them-bridge-svc"
      - "traefik.http.routers.them-health.rule=Host(`${THE_M_HOSTNAME:-localhost}`) && PathPrefix(`/health`)"
      - "traefik.http.routers.them-health.entrypoints=web"
      - "traefik.http.routers.them-health.priority=90"
      - "traefik.http.routers.them-health.service=them-bridge-svc"
      - "traefik.http.routers.them-apps.rule=Host(`${THE_M_HOSTNAME:-localhost}`) && PathPrefix(`/apps`)"
      - "traefik.http.routers.them-apps.entrypoints=web"
      - "traefik.http.routers.them-apps.priority=100"
      - "traefik.http.routers.them-apps.service=them-bridge-svc"
      - "traefik.http.routers.them-a2a.rule=Host(`${THE_M_HOSTNAME:-localhost}`) && PathPrefix(`/a2a`)"
      - "traefik.http.routers.them-a2a.entrypoints=web"
      - "traefik.http.routers.them-a2a.priority=100"
      - "traefik.http.routers.them-a2a.service=them-bridge-svc"
      - "traefik.http.services.them-bridge-svc.loadbalancer.server.port=8001"
      - "traefik.http.services.them-bridge-svc.loadbalancer.healthcheck.path=/health/live"
      - "traefik.http.services.them-bridge-svc.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.them-bridge-svc.loadbalancer.healthcheck.timeout=3s"
    networks:
      - them-network
      - proxy-network
    depends_on:
      them-postgres:
        condition: service_healthy
      them-redis:
        condition: service_healthy
      them-auth-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ============================================================
  # the-M Bridge Replica 2 — enable with: docker compose --profile replica up -d
  # ============================================================
  them-bridge-2:
    build:
      context: .
      dockerfile: Dockerfile
    image: odin-them-bridge:latest
    container_name: them-bridge-2
    profiles: [replica]
    expose:
      - "8001"
    volumes:
      - .:/app
      - ./data/them-logs:/app/logs
    environment:
      THE_M_INSTANCE_ID: "bridge-2"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8001"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      DATABASE_HOST: "them-postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "them"
      DATABASE_USER: ${THE_M_DB_USER:-them}
      DATABASE_PASSWORD: ${THE_M_DB_PASSWORD:-them_secret}
      REDIS_HOST: "them-redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_SSL: "false"
      AUTH_SERVICE_URL: "http://them-auth-service:8701"
      SECRET_KEY: ${THE_M_SECRET_KEY:-change-this-secret-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: ${THE_M_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "json"
      TEMPORAL_ENABLED: "true"
      TEMPORAL_HOST: "temporal-frontend:7233"
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_TASK_QUEUE: "them-orchestration"
    labels:
      - "traefik.enable=true"
      - "traefik-instance=them"
      - "traefik.docker.network=them-network"
      - "traefik.http.services.them-bridge-svc.loadbalancer.server.port=8001"
      - "traefik.http.services.them-bridge-svc.loadbalancer.healthcheck.path=/health/live"
      - "traefik.http.services.them-bridge-svc.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.them-bridge-svc.loadbalancer.healthcheck.timeout=3s"
    networks:
      - them-network
      - proxy-network
    depends_on:
      them-postgres:
        condition: service_healthy
      them-redis:
        condition: service_healthy
      them-auth-service:
        condition: service_healthy
    restart: unless-stopped

  # Mock agents removed in Phase 8.1 — omni_ws transport dropped.
  # All agents must be A2A (a2a_async transport). Use a2a-echo/slow/stream for testing.

  # ============================================================
  # the-M Frontend — Next.js dashboard (port 3200)
  # ============================================================
  them-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: them-frontend
    expose:
      - "3200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      THE_M_API_URL: "http://them-bridge:8001"
      THE_M_AUTH_URL: "http://them-auth-service:8701"
      NEXT_PUBLIC_BRIDGE_WS_URL: ""
    labels:
      - "traefik.enable=true"
      - "traefik-instance=them"
      - "traefik.docker.network=them-network"
      - "traefik.http.routers.them-ui.rule=Host(`${THE_M_HOSTNAME:-localhost}`)"
      - "traefik.http.routers.them-ui.entrypoints=web"
      - "traefik.http.routers.them-ui.priority=1"
      - "traefik.http.routers.them-ui.service=them-ui-svc"
      - "traefik.http.services.them-ui-svc.loadbalancer.server.port=3200"
    networks:
      - them-network
      - proxy-network
    depends_on:
      them-bridge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O/dev/null http://localhost:3200/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── A2A Test Agents — enable with: docker compose --profile test-agents up -d ─

  a2a-echo:
    build:
      context: ./agents/a2a_echo
      dockerfile: Dockerfile
    container_name: a2a-echo
    profiles: [test-agents]
    expose:
      - "9200"
    environment:
      PORT: "9200"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9200/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  a2a-slow:
    build:
      context: ./agents/a2a_slow
      dockerfile: Dockerfile
    container_name: a2a-slow
    profiles: [test-agents]
    expose:
      - "9201"
    environment:
      PORT: "9201"
      SLOW_DELAY_S: "5"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9201/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  a2a-stream:
    build:
      context: ./agents/a2a_stream
      dockerfile: Dockerfile
    container_name: a2a-stream
    profiles: [test-agents]
    expose:
      - "9202"
    environment:
      PORT: "9202"
      WORD_DELAY_S: "0.05"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9202/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Documentation Writer — enable with: docker compose --profile docu up -d ──
  docu-writer:
    build:
      context: ./agents/docu_writer
      dockerfile: Dockerfile
    container_name: docu-writer
    profiles: [docu]
    expose:
      - "9300"
    environment:
      PORT: "9300"
      ANTHROPIC_API_KEY: "${DOCU_WRITER_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9300/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Security Scanner — enable with: docker compose --profile security up -d ──

  them-security-agent:
    build:
      context: ./agents/security_scanner
      dockerfile: Dockerfile
    container_name: them-security-agent
    profiles: [security]
    expose:
      - "9500"
    environment:
      PORT: "9500"
      ANTHROPIC_API_KEY: "${SECURITY_SCANNER_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9500/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Workflow Advisor — enable with: docker compose --profile advisor up -d ────

  them-workflow-advisor:
    build:
      context: ./agents/workflow_advisor
      dockerfile: Dockerfile
    container_name: them-workflow-advisor
    profiles: [advisor]
    expose:
      - "9600"
    environment:
      PORT: "9600"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9600/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Debate Agents — enable with: docker compose --profile debate up -d ───────

  agent-evidence:
    build:
      context: ./agents/debate/agent_evidence
      dockerfile: Dockerfile
    container_name: agent-evidence
    profiles: [debate]
    expose:
      - "9401"
    environment:
      PORT: "9401"
      ANTHROPIC_API_KEY: "${DEBATE_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}"
      MODEL: "claude-haiku-4-5-20251001"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9401/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  agent-logic:
    build:
      context: ./agents/debate/agent_logic
      dockerfile: Dockerfile
    container_name: agent-logic
    profiles: [debate]
    expose:
      - "9402"
    environment:
      PORT: "9402"
      ANTHROPIC_API_KEY: "${DEBATE_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}"
      MODEL: "claude-haiku-4-5-20251001"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9402/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  agent-creative:
    build:
      context: ./agents/debate/agent_creative
      dockerfile: Dockerfile
    container_name: agent-creative
    profiles: [debate]
    expose:
      - "9403"
    environment:
      PORT: "9403"
      ANTHROPIC_API_KEY: "${DEBATE_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}"
      MODEL: "claude-haiku-4-5-20251001"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9403/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  agent-judge:
    build:
      context: ./agents/debate/agent_judge
      dockerfile: Dockerfile
    container_name: agent-judge
    profiles: [debate]
    expose:
      - "9404"
    environment:
      PORT: "9404"
      ANTHROPIC_API_KEY: "${DEBATE_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}"
      MODEL: "claude-sonnet-4-6"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9404/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Temporal — durable execution runtime (profile: temporal)
  # Enable with: docker compose --profile temporal up -d
  # ============================================================

  temporal-frontend:
    image: temporalio/auto-setup:1.25.2
    container_name: temporal-frontend
    profiles: [temporal]
    expose:
      - "7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${THE_M_DB_USER:-them}
      - POSTGRES_PWD=${THE_M_DB_PASSWORD:-them_secret}
      - POSTGRES_SEEDS=them-postgres
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
      - LOG_LEVEL=warn
    networks:
      - them-network
    depends_on:
      them-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233", "--namespace", "default"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: temporal-ui
    profiles: [temporal]
    expose:
      - "8080"
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3111
      - TEMPORAL_UI_PUBLIC_PATH=/temporal
      - TEMPORAL_CSRF_COOKIE_INSECURE=true
    labels:
      - "traefik.enable=true"
      - "traefik-instance=them"
      - "traefik.docker.network=them-network"
      - "traefik.http.routers.them-temporal-ui.rule=PathPrefix(`/temporal`)"
      - "traefik.http.routers.them-temporal-ui.entrypoints=web"
      - "traefik.http.routers.them-temporal-ui.priority=150"
      - "traefik.http.routers.them-temporal-ui.service=them-temporal-ui-svc"
      - "traefik.http.services.them-temporal-ui-svc.loadbalancer.server.port=8080"
    networks:
      - them-network
    depends_on:
      - temporal-frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: temporal-admin-tools
    profiles: [temporal]
    entrypoint: ["sleep", "infinity"]
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
      - TEMPORAL_CLI_ADDRESS=temporal-frontend:7233
    networks:
      - them-network
    depends_on:
      - temporal-frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  them-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: them-worker
    profiles: [temporal]
    volumes:
      - .:/app
      - ./data/them-logs:/app/logs
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_HOST: "them-postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "them"
      DATABASE_USER: ${THE_M_DB_USER:-them}
      DATABASE_PASSWORD: ${THE_M_DB_PASSWORD:-them_secret}
      REDIS_HOST: "them-redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_SSL: "false"
      AUTH_SERVICE_URL: "http://them-auth-service:8701"
      SECRET_KEY: ${THE_M_SECRET_KEY:-change-this-secret-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "json"
      TEMPORAL_ENABLED: "true"
      TEMPORAL_HOST: "temporal-frontend:7233"
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_TASK_QUEUE: "them-orchestration"
    networks:
      - them-network
    depends_on:
      them-postgres:
        condition: service_healthy
      them-redis:
        condition: service_healthy
      them-auth-service:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Vision Agent — Location Visualizer ──────────────────────────────────────
  vision-agent:
    build:
      context: ./agents/vision_agent
      dockerfile: Dockerfile
    container_name: vision-agent
    environment:
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
      FAL_API_KEY: "${FAL_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PORT: "9100"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
