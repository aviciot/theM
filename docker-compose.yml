version: "3.9"

# ============================================================
# the-M — Multi-Agent Orchestration Platform
# Fully isolated stack: own Postgres, own Redis, own network.
# ============================================================

networks:
  them-network:
    name: them-network
    driver: bridge
  proxy-network:
    external: true

# No named volumes — all data uses bind-mount folders under ./volumes/
# This ensures data survives container rebuilds and is visible on the host.

services:

  # ============================================================
  # the-M Postgres — isolated PG16, DB: them
  # ============================================================
  them-postgres:
    image: postgres:16-alpine
    container_name: them-postgres
    environment:
      POSTGRES_DB: them
      POSTGRES_USER: ${THE_M_DB_USER:-them}
      POSTGRES_PASSWORD: ${THE_M_DB_PASSWORD:-them_secret}
    volumes:
      - ./data/them-postgres/pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${THE_M_DB_USER:-them} -d them"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================
  # the-M Redis — isolated Redis, DB index 0 (we own it entirely)
  # ============================================================
  them-redis:
    image: redis:7-alpine
    container_name: them-redis
    command: redis-server /etc/redis/redis.conf ${THE_M_REDIS_PASSWORD:+--requirepass $THE_M_REDIS_PASSWORD}
    volumes:
      - ./data/them-redis:/data
      - ./redis/config/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # the-M Auth Service — authentication & IAM (port 8701)
  # ============================================================
  them-auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: them-auth-service
    expose:
      - "8701"
    environment:
      HOST: "0.0.0.0"
      PORT: "8701"
      DATABASE_URL: "postgresql://${THE_M_DB_USER:-them}:${THE_M_DB_PASSWORD:-them_secret}@them-postgres:5432/them"
      JWT_SECRET: ${THE_M_JWT_SECRET:-change-this-jwt-secret}
      CORS_ORIGINS: ${THE_M_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - them-network
    depends_on:
      them-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8701/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================
  # the-M Bridge — orchestrator API + WS (replica 1)
  # ============================================================
  them-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: them-bridge
    expose:
      - "8001"
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - ./data/them-logs:/app/logs
    environment:
      THE_M_INSTANCE_ID: "bridge-1"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8001"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      DATABASE_HOST: "them-postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "them"
      DATABASE_USER: ${THE_M_DB_USER:-them}
      DATABASE_PASSWORD: ${THE_M_DB_PASSWORD:-them_secret}
      REDIS_HOST: "them-redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_SSL: "false"
      AUTH_SERVICE_URL: "http://them-auth-service:8701"
      SECRET_KEY: ${THE_M_SECRET_KEY:-change-this-secret-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: ${THE_M_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "json"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.routers.them.rule=Host(`${THE_M_HOSTNAME:-them.example.com}`)"
      - "traefik.http.routers.them.priority=20"
      - "traefik.http.services.them-svc.loadbalancer.server.port=8001"
      - "traefik.http.services.them-svc.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.them-svc.loadbalancer.sticky.cookie.name=them_sticky"
      - "traefik.http.services.them-svc.loadbalancer.sticky.cookie.httponly=true"
      - "traefik.http.services.them-svc.loadbalancer.healthcheck.path=/health/live"
      - "traefik.http.services.them-svc.loadbalancer.healthcheck.interval=10s"
    networks:
      - them-network
      - proxy-network
    depends_on:
      them-postgres:
        condition: service_healthy
      them-redis:
        condition: service_healthy
      them-auth-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ============================================================
  # the-M Bridge Replica 2 — enable with: docker compose --profile replica up -d
  # ============================================================
  them-bridge-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: them-bridge-2
    profiles: [replica]
    expose:
      - "8001"
    volumes:
      - .:/app
      - ./data/them-logs:/app/logs
    environment:
      THE_M_INSTANCE_ID: "bridge-2"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8001"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      DATABASE_HOST: "them-postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "them"
      DATABASE_USER: ${THE_M_DB_USER:-them}
      DATABASE_PASSWORD: ${THE_M_DB_PASSWORD:-them_secret}
      REDIS_HOST: "them-redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_SSL: "false"
      AUTH_SERVICE_URL: "http://them-auth-service:8701"
      SECRET_KEY: ${THE_M_SECRET_KEY:-change-this-secret-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: ${THE_M_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "json"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.them-svc.loadbalancer.server.port=8001"
      - "traefik.http.services.them-svc.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.them-svc.loadbalancer.sticky.cookie.name=them_sticky"
    networks:
      - them-network
      - proxy-network
    depends_on:
      them-postgres:
        condition: service_healthy
      them-redis:
        condition: service_healthy
      them-auth-service:
        condition: service_healthy
    restart: unless-stopped

  # Mock agents removed in Phase 8.1 — omni_ws transport dropped.
  # All agents must be A2A (a2a_async transport). Use a2a-echo/slow/stream for testing.

  # ============================================================
  # the-M Frontend — Next.js dashboard (port 3200)
  # ============================================================
  them-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: them-frontend
    expose:
      - "3200"
    ports:
      - "3200:3200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      THE_M_API_URL: "http://them-bridge:8001"
      THE_M_AUTH_URL: "http://them-auth-service:8701"
      NEXT_PUBLIC_BRIDGE_WS_URL: "${THE_M_BRIDGE_WS_URL:-ws://localhost:8001}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.routers.them-ui.rule=Host(`${THE_M_UI_HOSTNAME:-them-ui.example.com}`)"
      - "traefik.http.routers.them-ui.priority=10"
      - "traefik.http.services.them-ui-svc.loadbalancer.server.port=3200"
    networks:
      - them-network
      - proxy-network
    depends_on:
      them-bridge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-L", "http://localhost:3200/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── A2A Test Agents — enable with: docker compose --profile test-agents up -d ─

  a2a-echo:
    build:
      context: ./agents/a2a_echo
      dockerfile: Dockerfile
    container_name: a2a-echo
    profiles: [test-agents]
    expose:
      - "9200"
    environment:
      PORT: "9200"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9200/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  a2a-slow:
    build:
      context: ./agents/a2a_slow
      dockerfile: Dockerfile
    container_name: a2a-slow
    profiles: [test-agents]
    expose:
      - "9201"
    environment:
      PORT: "9201"
      SLOW_DELAY_S: "5"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9201/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  a2a-stream:
    build:
      context: ./agents/a2a_stream
      dockerfile: Dockerfile
    container_name: a2a-stream
    profiles: [test-agents]
    expose:
      - "9202"
    environment:
      PORT: "9202"
      WORD_DELAY_S: "0.05"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9202/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Vision Agent — Location Visualizer ──────────────────────────────────────
  vision-agent:
    build:
      context: ./agents/vision_agent
      dockerfile: Dockerfile
    container_name: vision-agent
    environment:
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
      FAL_API_KEY: "${FAL_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PORT: "9100"
    networks:
      - them-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
