version: "3.9"

# ============================================================
# Odin — Multi-Agent Orchestration Platform
# Fully isolated stack: own Postgres, own Redis, own network.
# No dependency on Omni containers.
# ============================================================

networks:
  odin-network:
    name: odin-network
    driver: bridge
  proxy-network:
    external: true

# No named volumes — all data uses bind-mount folders under ./volumes/
# This ensures data survives container rebuilds and is visible on the host.

services:

  # ============================================================
  # Odin Postgres — isolated PG16, DB: odin
  # ============================================================
  odin-postgres:
    image: postgres:16-alpine
    container_name: odin-postgres
    environment:
      POSTGRES_DB: odin
      POSTGRES_USER: ${ODIN_DB_USER:-odin}
      POSTGRES_PASSWORD: ${ODIN_DB_PASSWORD:-odin_secret}
    volumes:
      - ./volumes/postgres/pgdata:/var/lib/postgresql/data   # persistent data
      - ./postgres/init:/docker-entrypoint-initdb.d          # auto-run on first boot
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODIN_DB_USER:-odin} -d odin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================
  # Odin Redis — isolated Redis, DB index 0 (we own it entirely)
  # ============================================================
  odin-redis:
    image: redis:7-alpine
    container_name: odin-redis
    command: redis-server /etc/redis/redis.conf ${ODIN_REDIS_PASSWORD:+--requirepass $ODIN_REDIS_PASSWORD}
    volumes:
      - ./volumes/redis:/data                        # persistent data
      - ./redis/config/redis.conf:/etc/redis/redis.conf:ro  # config
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Odin Auth Service — authentication & IAM (port 8701)
  # ============================================================
  odin-auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: odin-auth-service
    expose:
      - "8701"
    environment:
      HOST: "0.0.0.0"
      PORT: "8701"
      DATABASE_URL: "postgresql://${ODIN_DB_USER:-odin}:${ODIN_DB_PASSWORD:-odin_secret}@odin-postgres:5432/odin"
      JWT_SECRET: ${ODIN_JWT_SECRET:-change-this-jwt-secret}
      CORS_ORIGINS: ${ODIN_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - odin-network
    depends_on:
      odin-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8701/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================
  # Odin Bridge — orchestrator API + WS (replica 1)
  # ============================================================
  odin-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odin-bridge
    expose:
      - "8001"
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - ./volumes/logs:/app/logs
    environment:
      ODIN_INSTANCE_ID: "bridge-1"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8001"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      DATABASE_HOST: "odin-postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "odin"
      DATABASE_USER: ${ODIN_DB_USER:-odin}
      DATABASE_PASSWORD: ${ODIN_DB_PASSWORD:-odin_secret}
      REDIS_HOST: "odin-redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_SSL: "false"
      AUTH_SERVICE_URL: "http://odin-auth-service:8701"
      SECRET_KEY: ${ODIN_SECRET_KEY:-change-this-secret-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: ${ODIN_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "json"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.routers.odin.rule=Host(`${ODIN_HOSTNAME:-odin.example.com}`)"
      - "traefik.http.routers.odin.priority=20"
      - "traefik.http.services.odin-svc.loadbalancer.server.port=8001"
      - "traefik.http.services.odin-svc.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.odin-svc.loadbalancer.sticky.cookie.name=odin_sticky"
      - "traefik.http.services.odin-svc.loadbalancer.sticky.cookie.httponly=true"
      - "traefik.http.services.odin-svc.loadbalancer.healthcheck.path=/health/live"
      - "traefik.http.services.odin-svc.loadbalancer.healthcheck.interval=10s"
    networks:
      - odin-network
      - proxy-network
    depends_on:
      odin-postgres:
        condition: service_healthy
      odin-redis:
        condition: service_healthy
      odin-auth-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ============================================================
  # Odin Bridge Replica 2 — enable with: docker compose --profile replica up -d
  # ============================================================
  odin-bridge-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odin-bridge-2
    profiles: [replica]
    expose:
      - "8001"
    volumes:
      - .:/app
      - ./volumes/logs:/app/logs
    environment:
      ODIN_INSTANCE_ID: "bridge-2"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8001"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      DATABASE_HOST: "odin-postgres"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "odin"
      DATABASE_USER: ${ODIN_DB_USER:-odin}
      DATABASE_PASSWORD: ${ODIN_DB_PASSWORD:-odin_secret}
      REDIS_HOST: "odin-redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_SSL: "false"
      AUTH_SERVICE_URL: "http://odin-auth-service:8701"
      SECRET_KEY: ${ODIN_SECRET_KEY:-change-this-secret-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CORS_ORIGINS: ${ODIN_CORS_ORIGINS:-http://localhost:3111}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "json"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.odin-svc.loadbalancer.server.port=8001"
      - "traefik.http.services.odin-svc.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.odin-svc.loadbalancer.sticky.cookie.name=odin_sticky"
    networks:
      - odin-network
      - proxy-network
    depends_on:
      odin-postgres:
        condition: service_healthy
      odin-redis:
        condition: service_healthy
      odin-auth-service:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # Mock Agents — lightweight WS agents for testing the pipeline
  # Add more by copying a block and changing the service name + env.
  # ============================================================

  mock-agent-assistant:
    build:
      context: ./mock_agent
      dockerfile: Dockerfile
    container_name: mock-agent-assistant
    expose:
      - "9000"
    environment:
      AGENT_NAME: "Assistant"
      AGENT_PERSONA: "a general-purpose helpful assistant"
      AGENT_DELAY: "0.03"
      PORT: "9000"
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',9000),2); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mock-agent-researcher:
    build:
      context: ./mock_agent
      dockerfile: Dockerfile
    container_name: mock-agent-researcher
    expose:
      - "9000"
    environment:
      AGENT_NAME: "Researcher"
      AGENT_PERSONA: "a deep research specialist who finds facts and summarizes sources"
      AGENT_DELAY: "0.05"
      PORT: "9000"
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',9000),2); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mock-agent-coder:
    build:
      context: ./mock_agent
      dockerfile: Dockerfile
    container_name: mock-agent-coder
    expose:
      - "9000"
    environment:
      AGENT_NAME: "Coder"
      AGENT_PERSONA: "a senior software engineer who writes clean, tested code"
      AGENT_DELAY: "0.02"
      PORT: "9000"
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',9000),2); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Odin Frontend — Next.js dashboard (port 3200)
  # ============================================================
  odin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: odin-frontend
    expose:
      - "3200"
    ports:
      - "3200:3200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      ODIN_API_URL: "http://odin-bridge:8001"
      ODIN_AUTH_URL: "http://odin-auth-service:8701"
      NEXT_PUBLIC_BRIDGE_WS_URL: "${ODIN_BRIDGE_WS_URL:-ws://localhost:8001}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.routers.odin-ui.rule=Host(`${ODIN_UI_HOSTNAME:-odin-ui.example.com}`)"
      - "traefik.http.routers.odin-ui.priority=10"
      - "traefik.http.services.odin-ui-svc.loadbalancer.server.port=3200"
    networks:
      - odin-network
      - proxy-network
    depends_on:
      odin-bridge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Vision Agent — Location Visualizer ──────────────────────────────────────
  vision-agent:
    build:
      context: ./agents/vision_agent
      dockerfile: Dockerfile
    container_name: vision-agent
    environment:
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
      FAL_API_KEY: "${FAL_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PORT: "9100"
    networks:
      - odin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
